<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rubik's Cube Solver</title>

    <!-- 1. Premium Typography from Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap"
        rel="stylesheet">

    <!-- 2. Modern Glassmorphism Styling -->
    <link rel="stylesheet" href="style.css">

    <!-- 3. Premium Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body>
    <!-- Radial background glows for futuristic vibes -->
    <div class="background-glow"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="navbar">
            <div class="brand">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                    </path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                <h1 data-i18n="title">Rubik's Solver</h1>
            </div>

            <nav class="nav-links">
                <select id="theme-select" class="lang-select" aria-label="Select color scheme">
                    <option value="standard" data-i18n="scheme-standard">Standard Colors</option>
                    <option value="custom" data-i18n="scheme-custom">Custom Colors</option>
                </select>

                <select id="lang-select" class="lang-select" aria-label="Select language">
                    <option value="en">EN</option>
                    <option value="fr">FR</option>
                </select>

                <a href="https://github.com/dmachard/cube-solver-wasm" target="_blank" rel="noopener noreferrer"
                    class="nav-item github-link" title="View Source on GitHub">
                    <svg viewBox="0 0 24 24" aria-hidden="true" width="20" height="20">
                        <path
                            d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.867 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.646.64.699 1.026 1.592 1.026 2.683 0 3.842-2.337 4.687-4.565 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.137 20.162 22 16.418 22 12c0-5.523-4.477-10-10-10z">
                        </path>
                    </svg>
                    <span>GitHub</span>
                </a>
            </nav>
        </header>

        <!-- Main Workspace (Responsive Single Column) -->
        <main class="workspace">

            <!-- SINGLE PANEL: 3D Render, Palette & Interactive Player -->
            <section class="panel visualizer-panel">
                <!-- Interactive Color Palette -->
                <div class="palette-container">
                    <label data-i18n="select-color"></label>
                    <p class="panel-desc" data-i18n="2d-desc"></p>
                    <div class="palette">
                        <button class="color-btn active" data-color="U" style="background-color: var(--color-u);"
                            data-i18n-title="color-u-desc" title="White (Up / U)"></button>
                        <button class="color-btn" data-color="L" style="background-color: var(--color-l);"
                            data-i18n-title="color-l-desc" title="Orange (Left / L)"></button>
                        <button class="color-btn" data-color="F" style="background-color: var(--color-f);"
                            data-i18n-title="color-f-desc" title="Green (Front / F)"></button>
                        <button class="color-btn" data-color="R" style="background-color: var(--color-r);"
                            data-i18n-title="color-r-desc" title="Red (Right / R)"></button>
                        <button class="color-btn" data-color="B" style="background-color: var(--color-b);"
                            data-i18n-title="color-b-desc" title="Blue (Back / B)"></button>
                        <button class="color-btn" data-color="D" style="background-color: var(--color-d);"
                            data-i18n-title="color-d-desc" title="Yellow (Down / D)"></button>
                    </div>
                </div>

                <!-- Custom Scheme Color Pickers -->
                <div id="custom-theme-config" class="theme-config-panel hidden">
                    <div class="config-title-row">
                        <h4 data-i18n="custom-colors-title">Personnaliser les couleurs :</h4>
                    </div>
                    <div class="config-grid">
                        <div class="config-item">
                            <span class="color-dot" style="background-color: var(--color-u);"></span>
                            <span data-i18n="face-u">Haut</span>
                            <input type="color" id="picker-u" value="#ff6baf">
                        </div>
                        <div class="config-item">
                            <span class="color-dot" style="background-color: var(--color-l);"></span>
                            <span data-i18n="face-l">Gauche</span>
                            <input type="color" id="picker-l" value="#f97316">
                        </div>
                        <div class="config-item">
                            <span class="color-dot" style="background-color: var(--color-f);"></span>
                            <span data-i18n="face-f">Devant</span>
                            <input type="color" id="picker-f" value="#10b981">
                        </div>
                        <div class="config-item">
                            <span class="color-dot" style="background-color: var(--color-r);"></span>
                            <span data-i18n="face-r">Droite</span>
                            <input type="color" id="picker-r" value="#8b5cf6">
                        </div>
                        <div class="config-item">
                            <span class="color-dot" style="background-color: var(--color-b);"></span>
                            <span data-i18n="face-b">Arrière</span>
                            <input type="color" id="picker-b" value="#2563eb">
                        </div>
                        <div class="config-item">
                            <span class="color-dot" style="background-color: var(--color-d);"></span>
                            <span data-i18n="face-d">Bas</span>
                            <input type="color" id="picker-d" value="#ffea00">
                        </div>
                    </div>
                </div>



                <!-- Three.js Canvas Container -->
                <div class="canvas-container" id="canvas-container">
                    <!-- Verification Box (Crucial for validation status) -->
                    <div class="validation-box warning" id="validation-box">
                        <span id="validation-message" data-i18n="wasm-loading">Loading Rust/WASM Engine...</span>
                    </div>
                </div>

                <!-- Interactive Media Player for the solution moves (Horizontal Underneath) -->
                <div id="player-panel" class="player-panel">
                    <!-- Horizontal timeline list of solving moves -->
                    <div class="timeline-container">
                        <div class="moves-timeline" id="moves-timeline">
                            <!-- Populated dynamically via JS -->
                        </div>
                    </div>
                </div>

                <!-- Main Action Buttons -->
                <div class="main-actions">
                    <button id="btn-reset" class="btn-secondary" data-i18n="reset-solved">🗑️ Reset</button>
                    <button id="btn-random" class="btn-secondary" data-i18n="random-scramble">🎲 Scramble</button>
                    <button id="btn-solve" class="btn-primary" disabled data-i18n="solve-cube">
                        <span class="btn-text">Solve Cube</span>
                        <div class="loader hidden"></div>
                    </button>
                </div>
            </section>

        </main>

        <!-- Footer -->
        <footer>
            <p><span data-i18n="built-with">📦 Built with Rust, WebAssembly and Three.js | </span><span
                    class="app-version">v...</span></p>
            <p class="footer-credit"><span data-i18n="made-by">Made by</span> <a href="https://github.com/dmachard"
                    target="_blank" rel="noopener noreferrer">@dmachard</a> ✨ <span data-i18n="vibe-coded">vibe
                    coded</span> ✨</p>
        </footer>
    </div>

    <!-- Hidden sync element for state management -->
    <input type="hidden" id="cube-string" value="UUUUUUUUURRRRRRRRRFFFFFFFFFDDDDDDDDDLLLLLLLLLBBBBBBBBB">

    <!-- External CDNs for 3D engine, camera controls and fluid animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Core JS Application -->
    <script type="module" src="app.js"></script>
</body>

</html>
